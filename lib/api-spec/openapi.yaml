      summary: Get reproducible AI metrics snapshot
      description: |-
        Computes deterministic aggregates over AI run evaluations for a requested scope and explicit window.

        The server normalizes the requested window to the metrics contract bucket boundaries.
        If integrity issues are detected in the underlying rows, the response returns status=degraded with reasons.
      parameters:
        - name: metricsVersion
          in: query
          required: true
          schema:
            type: string
            enum: [v1]
        - name: windowStart
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: windowEnd
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: taskScope
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Metrics snapshot response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMetricsSnapshotResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

