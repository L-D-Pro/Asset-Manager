                $ref: "#/components/schemas/UISlotItem"
          required:
            - navbar
            - sidebar
            - dashboardGrid
        updatedAt:
          type: string
        updatedBy:
          type: ["integer", "null"]
      required:
        - version
        - appKey
        - themeID
        - slots
        - updatedAt
        - updatedBy

    # ── Chat (Conversational UI) ──────────────────────────────────────────
    ChatThread:
      type: object
      description: A persistent chat conversation belonging to a single user.
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        modelScope:
          type: string
          description: Maps to `ai_model_configs.task_scope`. Defaults to `chat`.
        archivedAt:
          type: ["string", "null"]
          description: ISO timestamp when archived; null = active.
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - title
        - modelScope
        - archivedAt
        - createdAt
        - updatedAt

    CreateChatThreadBody:
      type: object
      properties:
        title:
          type: string
          maxLength: 200

    UpdateChatThreadBody:
      type: object
      description: Provide at least one of `title` or `archived`.
      properties:
        title:
          type: string
          maxLength: 200
        archived:
          type: boolean

    ChatAttachmentBaseResume:
      type: object
      description: Snapshot of the user's base resume, captured at message send time.
      properties:
        kind:
          type: string
          enum: [base_resume]
        refId:
          type: integer
        snapshot:
          type: object
          properties:
            version:
              type: integer
            capturedAt:
              type: string
            contentText:
              type: string
          required:
            - contentText
      required:
        - kind
        - snapshot

    ChatAttachmentJob:
      type: object
      description: Snapshot of a job listing's metadata + JD text.
      properties:
        kind:
          type: string
          enum: [job]
        refId:
          type: integer
        snapshot:
          type: object
          properties:
            title:
              type: string
            company:
              type: string
            location:
              type: string
            jdText:
              type: string
          required:
            - title
            - jdText
      required:
        - kind
        - snapshot

    ChatAttachmentClaims:
      type: object
      description: A selection of claims from the ledger; unverified claims are flagged.
      properties:
        kind:
          type: string
          enum: [claims]
        refId:
          type: integer
        snapshot:
          type: object
          properties:
            claims:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  text:
                    type: string
                  verified:
                    type: boolean
                required:
                  - text
                  - verified
          required:
            - claims
      required:
        - kind
        - snapshot

    ChatAttachment:
      description: Discriminated union of attachment kinds.
      oneOf:
        - $ref: "#/components/schemas/ChatAttachmentBaseResume"
        - $ref: "#/components/schemas/ChatAttachmentJob"
        - $ref: "#/components/schemas/ChatAttachmentClaims"
      discriminator:
        propertyName: kind
        mapping:
          base_resume: "#/components/schemas/ChatAttachmentBaseResume"
          job: "#/components/schemas/ChatAttachmentJob"
          claims: "#/components/schemas/ChatAttachmentClaims"

    ChatMessage:
      type: object
      description: One turn within a chat thread.
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachment"
        runId:
          type: ["string", "null"]
          description: Canonical AI lineage id for assistant turns; matches `event_logs.runId`.
        promptVersionId:
          type: ["integer", "null"]
        modelName:
          type: ["string", "null"]
        promptTokens:
          type: ["integer", "null"]
        completionTokens:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - role
        - content
        - attachments
        - createdAt

    PostChatMessageBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 20000
        attachments:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ChatAttachment"
      required:
        - content

    ChatFeedbackBody:
      type: object
      properties:
        outcome:
          type: string
          enum: [approved, rejected]
        notes:
          type: string
          maxLength: 2000
      required:
        - outcome
