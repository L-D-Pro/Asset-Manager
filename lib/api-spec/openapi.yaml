components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    AppKey:
      name: appKey
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ── Role Profile ────────────────────────────────────────────────────────
    BaseResumeVersion:
      type: object
      properties:
        id:
          type: integer
        label:
          type: ["string", "null"]
        contentText:
          type: string
        isCurrent:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - contentText
        - isCurrent
        - createdAt
        - updatedAt

    CreateBaseResumeBody:
      type: object
      properties:
        label:
          type: ["string", "null"]
        contentText:
          type: string
      required:
        - contentText

    ImportBaseResumeBody:
      type: object
      properties:
        file:
          type: string
          format: binary
        label:
          type: string
      required:
        - file

    RoleProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        hardFilters:
          type: object
          description: JSON object with hard filter criteria
        softWeights:
          type: object
          description: JSON object with soft scoring weights
        companyAllowList:
          type: array
          items:
            type: string
        companyDenyList:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - hardFilters
        - softWeights
        - companyAllowList
        - companyDenyList
        - isActive
        - createdAt
        - updatedAt

    CreateRoleProfileBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        hardFilters:
          type: object
