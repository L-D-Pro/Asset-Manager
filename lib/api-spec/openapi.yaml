  # ── Chat (Conversational UI) ───────────────────────────────────────────────
  /chat/threads:
    get:
      operationId: listChatThreads
      tags: [chat]
      summary: List the authenticated user's chat threads
      parameters:
        - name: include_archived
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
          description: When set, archived threads are included in the response.
      responses:
        "200":
          description: List of chat threads (newest updated first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatThread"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createChatThread
      tags: [chat]
      summary: Create a new empty chat thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatThreadBody"
      responses:
        "201":
          description: Created chat thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatThread"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /chat/threads/{id}:
    patch:
      operationId: updateChatThread
      tags: [chat]
      summary: Rename / archive / unarchive a chat thread
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChatThreadBody"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatThread"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteChatThread
      tags: [chat]
      summary: Hard-delete a chat thread (cascades to messages)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /chat/threads/{id}/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List all messages in a chat thread (chronological)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Messages in send order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: postChatMessage
      tags: [chat]
      summary: Append a user message and stream the assistant reply
      description: |
        Appends the user message to the thread (snapshotting any attached
        context), then streams the assistant reply as Server-Sent Events.

        SSE frame shape:
          - default `message` event: `data: {"token": "..."}` (one per delta)
          - `event: user-message` `data: {"id": <number>, "role": "user"}` (once at start)
          - `event: error` `data: {"message": "..."}` (terminal failure)
          - `event: done` `data: {"messageId": <number>, "runId": "chat_...", "promptVersionId": <number|null>, "eventLogId": <number|null>, "primarySkill": "<skill-slug>|general"}` (terminal success)

        The response Content-Type is `text/event-stream`; this endpoint is NOT
        consumed via the generated React Query hooks — clients read the body
        as a `ReadableStream` directly.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostChatMessageBody"
      responses:
        "200":
          description: SSE stream of assistant reply tokens, terminating in a `done` event with the persisted message id
          content:
            text/event-stream:
              schema:
                type: string
                description: Stream of SSE frames; see endpoint description for the framing.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: No active AI model configured for the thread's model scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages/{id}/feedback:
    post:
      operationId: postChatMessageFeedback
      tags: [chat]
      summary: Thumbs up/down on an assistant message — writes ai_run_evaluations
      description: |
        Records the user's evaluation of an assistant turn. The endpoint looks
        up the message's canonical runId and the matching event_logs row, then
        inserts an ai_run_evaluations row (taskScope='chat',
        entityType='chat_message', entityId=<message id>) so the existing
        learning loop aggregates the outcome into ai_variant_stats.

        One feedback record per message — re-submitting returns 409.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatFeedbackBody"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRunEvaluation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Feedback already recorded for this message, or no AI lineage event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

