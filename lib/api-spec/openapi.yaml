    get:
      operationId: getAiLearningHealth
      tags: [ai-learning]
      summary: Get AI learning loop health metrics
      description: |-
        Returns vital health indicators for the self-evolution pipeline:
        unprocessed signal counts, variant comparison status, auto-promote configuration,
        and overall health assessment (healthy / warning / degraded).
      responses:
        "200":
          description: AI learning loop health metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiLearningHealth"

  /ai-learning/recompute:
    post:
      operationId: recomputeAiLearning
      tags: [ai-learning]
      summary: Trigger recompute of variant stats and Bayesian comparisons
      description: |-
        Processes all unprocessed feedback signals to compute/update variant stats
        (both prompt and model variants), then runs pairwise Bayesian comparisons.
        Returns extended stats including model variant counts and comparison results.

        If `autoPromoteEnabled` is active in `ai_learning_config`, winning variants
        are automatically promoted (prompt versions set to active, model configs prioritized).
        Human approval is still required in suggest mode.
      parameters:
        - name: unprocessedOnly
          in: query
          schema:
            type: boolean
            default: true
          description: If true (default), only process signals where processedAt IS NULL.
            If false, recompute all signals regardless of processed state.
      responses:
        "200":
          description: Recompute result with variant stats and comparison counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecomputeResponse"
        "500":
          description: Recompute failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-learning/leaderboard:
    get:
      operationId: getAiLearningLeaderboard
      tags: [ai-learning]
      summary: Get variant leaderboard with model variant support
      description: |-
        Returns ranked variant performance across prompt versions and model configs.
        Each entry includes success/failure counts, success rate, cost data, and label
        resolution (prompt label or model name). Supports filtering by taskScope.
      parameters:
        - name: taskScope
          in: query
          schema:
            type: string
          description: Filter by task scope (e.g., resume_tailor, cover_letter_draft)
      responses:
        "200":
          description: Ranked leaderboard entries with variant labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiLearningLeaderboardEntry"

