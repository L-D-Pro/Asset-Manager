      tags: [feedback-signals]
      summary: List feedback signals
      parameters:
        - name: applicationId
          in: query
          schema:
            type: integer
        - name: outcome
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of feedback signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackSignal"
    post:
      operationId: createFeedbackSignal
      tags: [feedback-signals]
      summary: Create a feedback signal
      description: |-
        Records an outcome signal for a submitted application.

        **Wave 3 auto-evaluation**: If the signal outcome is `offer` or `hired` (positive) or `rejected` (negative),
        the server may automatically queue an AI evaluation of the associated output to build training data.
        This behavior is controlled by `ai_learning_config.autoPromoteEnabled`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedbackSignalBody"
      responses:
        "201":
          description: Created feedback signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSignal"

  /feedback-signals/{id}:
    get:
      operationId: getFeedbackSignal
      tags: [feedback-signals]
      summary: Get a feedback signal by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Feedback signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSignal"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateFeedbackSignal
      tags: [feedback-signals]
      summary: Update a feedback signal
      description: |-
        Updates an existing feedback signal's outcome, signal type, notes, or attribution data.

        **Auto-recompute trigger**: When the outcome or signal type changes, the server may mark
        the signal as unprocessed (clearing `processedAt`) so it is picked up by the next
        `/ai-learning/recompute` run. This ensures the Bayesian comparison engine re-evaluates
        variant performance with the corrected data.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedbackSignalBody"
      responses:
        "200":
          description: Updated feedback signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSignal"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFeedbackSignal
      tags: [feedback-signals]
      summary: Delete a feedback signal
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

