openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Job Application Operations Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: role-profiles
    description: Role profile management
  - name: base-resume
    description: Global base resume management
  - name: jobs
    description: Job ingestion and management
  - name: claims
    description: Claims ledger (truth lock system)
  - name: resume-versions
    description: Tailored resume version management
  - name: resume-templates
    description: Built-in ATS resume template metadata
  - name: cover-letter-versions
    description: Cover letter version management
  - name: applications
    description: Application tracking
  - name: event-logs
    description: Audit event log
  - name: feedback-signals
    description: Outcome feedback signals
  - name: ai-model-configs
    description: AI model configuration
  - name: ai-learning
    description: Prompt versions, evaluations, and training examples
  - name: assisted-apply
    description: Human-approved assisted apply session scaffolding
  - name: freelance
    description: Freelance project and proposal copilot
  - name: wizard-sessions
    description: Apply wizard save/resume sessions
  - name: trends
    description: Market research and trend analysis
  - name: job-board
    description: Aggregated job board listings
  - name: admin-reset
    description: Admin-only test data reset operations
  - name: admin-health
    description: Admin-only model config health checks
  - name: best-practices
    description: AI-suggested and curated best practices for job applications
  - name: chat
    description: Conversational UI — threads, streaming messages, and feedback for the chat MVP surface

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Role Profiles ──────────────────────────────────────────────────────────
  /role-profiles:
    get:
      operationId: listRoleProfiles
      tags: [role-profiles]
      summary: List all role profiles
      responses:
        "200":
          description: List of role profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleProfile"
    post:
      operationId: createRoleProfile
      tags: [role-profiles]
      summary: Create a role profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleProfileBody"
      responses:
        "201":
          description: Created role profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleProfile"

  /role-profiles/{id}:
    get:
      operationId: getRoleProfile
      tags: [role-profiles]
      summary: Get a role profile by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Role profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleProfile"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRoleProfile
      tags: [role-profiles]
      summary: Update a role profile
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleProfileBody"
      responses:
        "200":
          description: Updated role profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleProfile"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRoleProfile
      tags: [role-profiles]
      summary: Delete a role profile
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Jobs ───────────────────────────────────────────────────────────────────
  /base-resume:
    get:
      operationId: getBaseResume
      tags: [base-resume]
      summary: Get the current base resume
      responses:
        "200":
          description: Current base resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createBaseResume
      tags: [base-resume]
      summary: Save a new current base resume version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBaseResumeBody"
      responses:
        "201":
          description: Newly created current base resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResumeVersion"

  /base-resume/import:
    post:
      operationId: importBaseResume
      tags: [base-resume]
      summary: Import a DOCX or PDF resume as the new current base resume
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImportBaseResumeBody"
      responses:
        "201":
          description: Newly imported current base resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResumeVersion"
        "400":
          $ref: "#/components/responses/BadRequest"

  /base-resume/history:
    get:
      operationId: listBaseResumeHistory
      tags: [base-resume]
      summary: List base resume version history
      responses:
        "200":
          description: Base resume history newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BaseResumeVersion"

  /base-resume/{id}:
    delete:
      operationId: deleteBaseResumeVersion
      tags: [base-resume]
      summary: Delete a base resume version
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /base-resume/{id}/restore:
    post:
      operationId: restoreBaseResumeVersion
      tags: [base-resume]
      summary: Restore a historical base resume version as the new current version
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "201":
          description: Newly created restored current base resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: roleProfileId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create / ingest a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/score:
    get:
      operationId: scoreJob
      tags: [jobs]
      summary: Score a job against a role profile
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: roleProfileId
          in: query
          required: false
          schema:
            type: integer
          description: Override the role profile to score against. Defaults to the job's linked roleProfileId.
        - name: useResume
          in: query
          required: false
          schema:
            type: boolean
          description: If true, score the user's base resume against the job semantically instead of scoring the job against a role profile.
      responses:
        "200":
          description: Job score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobScoreResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/resume-score:
    post:
      operationId: resumeScore
      tags: [jobs]
      summary: Score the user's base resume semantically against a job
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Semantic resume scoring result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeScoreResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/parse:
    post:
      operationId: parseJobDescription
      tags: [jobs]
      summary: Parse job description with AI
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseJobBody"
      responses:
        "200":
          description: Updated job with parsed fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/research:
    post:
      operationId: researchJob
      tags: [jobs]
      summary: Research job and company with AI web search
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Updated job with research data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"


  /jobs/{id}/claim-matches:
    get:
      operationId: getJobClaimMatches
      tags: [jobs]
      summary: Get claims ranked by relevance to a job
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Ranked claim matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClaimMatch"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/tailor:
    post:
      operationId: tailorJobResume
      tags: [jobs]
      summary: AI-tailor resume for a job (creates a ResumeVersion)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TailorResumeBody"
      responses:
        "201":
          description: Newly created resume version with a full tailored draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "400":
          description: Base resume missing or request invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/cover-letter:
    post:
      operationId: draftCoverLetter
      tags: [jobs]
      summary: AI-draft cover letter for a job (creates a CoverLetterVersion)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftCoverLetterBody"
      responses:
        "201":
          description: Newly created cover letter version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Claims ─────────────────────────────────────────────────────────────────
  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List claims
      parameters:
        - name: domain
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"
    post:
      operationId: createClaim
      tags: [claims]
      summary: Create a claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimBody"
      responses:
        "201":
          description: Created claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  /claims/draft:
    post:
      operationId: draftClaims
      tags: [claims]
      summary: Draft claims from pasted text and optional uploaded evidence
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DraftClaimsBody"
      responses:
        "200":
          description: Draft claims for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftClaimsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /claims/{id}:
    get:
      operationId: getClaim
      tags: [claims]
      summary: Get a claim by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateClaim
      tags: [claims]
      summary: Update a claim
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClaimBody"
      responses:
        "200":
          description: Updated claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteClaim
      tags: [claims]
      summary: Delete a claim
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Resume Versions ────────────────────────────────────────────────────────
  /resume-templates:
    get:
      operationId: listResumeTemplates
      tags: [resume-templates]
      summary: List built-in resume templates
      responses:
        "200":
          description: Built-in resume template metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: "#/components/schemas/ResumeTemplate"
                required:
                  - templates

  /resume-versions:
    get:
      operationId: listResumeVersions
      tags: [resume-versions]
      summary: List resume versions
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of resume versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeVersion"

  /resume-versions/{id}:
    get:
      operationId: getResumeVersion
      tags: [resume-versions]
      summary: Get a resume version by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateResumeVersion
      tags: [resume-versions]
      summary: Update a resume version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeVersionBody"
      responses:
        "200":
          description: Updated resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteResumeVersion
      tags: [resume-versions]
      summary: Delete a resume version
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /resume-versions/{id}/approve:
    post:
      operationId: approveResumeVersion
      tags: [resume-versions]
      summary: Approve a resume version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalEvaluationBody"
      responses:
        "200":
          description: Approved resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /resume-versions/{id}/reject:
    post:
      operationId: rejectResumeVersion
      tags: [resume-versions]
      summary: Reject a resume version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalEvaluationBody"
      responses:
        "200":
          description: Rejected resume version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Cover Letter Versions ─────────────────────────────────────────────────
  /cover-letter-versions:
    get:
      operationId: listCoverLetterVersions
      tags: [cover-letter-versions]
      summary: List cover letter versions
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of cover letter versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoverLetterVersion"

  /cover-letter-versions/{id}:
    get:
      operationId: getCoverLetterVersion
      tags: [cover-letter-versions]
      summary: Get a cover letter version by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cover letter version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterVersion"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCoverLetterVersion
      tags: [cover-letter-versions]
      summary: Update a cover letter version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoverLetterVersionBody"
      responses:
        "200":
          description: Updated cover letter version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterVersion"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCoverLetterVersion
      tags: [cover-letter-versions]
      summary: Delete a cover letter version
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /cover-letter-versions/{id}/approve:
    post:
      operationId: approveCoverLetterVersion
      tags: [cover-letter-versions]
      summary: Approve a cover letter version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalEvaluationBody"
      responses:
        "200":
          description: Approved cover letter version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  /cover-letter-versions/{id}/reject:
    post:
      operationId: rejectCoverLetterVersion
      tags: [cover-letter-versions]
      summary: Reject a cover letter version
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalEvaluationBody"
      responses:
        "200":
          description: Rejected cover letter version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverLetterVersion"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Applications ──────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create an application record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get an application by ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application (including status transitions)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /applications/stats:
    get:
      operationId: getApplicationStats
      tags: [applications]
      summary: Get application outcome statistics
      responses:
        "200":
          description: Application stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationStats"

  # ── Event Logs ────────────────────────────────────────────────────────────
  /event-logs:
    get:
      operationId: listEventLogs
      tags: [event-logs]
      summary: List event logs
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
        - name: applicationId
          in: query
          schema:
            type: integer
        - name: jobId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of event logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventLog"
    post:
      operationId: createEventLog
      tags: [event-logs]
      summary: Create a manual event log entry
      description: Event logs are append-only audit records. Create a manual entry for user-initiated events not triggered by automated pipelines.
      requestBody:
        required: true
