name: job-ops
region: sfo3
features:
  - buildpack-stack=ubuntu-22

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: jops.ldpro.io
    type: PRIMARY

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: dashboard

services:
  - name: api
    environment_slug: node-js
    github:
      repo: L-D-Pro/Asset-Manager
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    build_command: ./scripts/do-build.sh api
    run_command: node --enable-source-maps artifacts/api-server/dist/index.mjs
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
      - key: DATABASE_URL
        value: REPLACE_WITH_YOUR_NEON_DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SESSION_SECRET
        value: REPLACE_WITH_A_LONG_RANDOM_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AI_INTEGRATIONS_OPENROUTER_API_KEY
        value: REPLACE_WITH_YOUR_OPENROUTER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AI_INTEGRATIONS_OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
        scope: RUN_TIME
        type: GENERAL
      - key: CHUTES_API_KEY
        value: REPLACE_WITH_YOUR_CHUTES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_USERNAME
        value: admin
        scope: RUN_TIME
        type: GENERAL
      - key: ADMIN_PASSWORD
        value: REPLACE_WITH_A_STRONG_BOOTSTRAP_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_EMAIL
        value: REPLACE_WITH_YOUR_ADMIN_EMAIL
        scope: RUN_TIME
        type: GENERAL
      - key: ALLOWED_ORIGINS
        value: https://jops.ldpro.io
        scope: RUN_TIME
        type: GENERAL

static_sites:
  - name: dashboard
    environment_slug: node-js
    github:
      repo: L-D-Pro/Asset-Manager
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: ./scripts/do-build.sh dashboard
    output_dir: artifacts/dashboard/dist/public
    catchall_document: index.html
    envs:
      - key: BASE_PATH
        value: /
        scope: BUILD_TIME
        type: GENERAL
